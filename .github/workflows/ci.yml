# CI: lint, test, then semantic-release.
# Tag + GitHub Release + changelog are produced by semantic-release.
# Library is auto-indexed by pkg.go.dev once the tag is pushed -- no
# additional release stage is needed.
#
# Required secrets:
#   APP_ID          - GitHub App ID (so the tag push triggers downstream workflows
#                     in other repos that consume this library, e.g. dras)
#   APP_PRIVATE_KEY - GitHub App private key
#
# Required repo variables (Settings > Variables > Actions):
#   GO_VERSION          - Go toolchain version (default: stable)
#   TEST_PACKAGES       - Go test package patterns (default: ./...)
#   TEST_ARGS           - Extra go test flags (default: empty)
#   COVERAGE_ENABLED    - Collect coverage (default: true)
#   COVERAGE_THRESHOLD  - Minimum coverage % (default: 0 = no gate)
#
# Required files:
#   .releaserc.json - semantic-release config
name: CI

"on":
  push:
    branches: [main]

# Newer runs supersede older ones -- cancels pending approval gates
concurrency:
  group: ci
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@main
    permissions:
      contents: read
    with:
      yaml: true
      go: true
      go-version: ${{ vars.GO_VERSION || 'stable' }}

  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@main
    permissions:
      contents: read
    with:
      test-framework: 'go'
      go-version: ${{ vars.GO_VERSION || 'stable' }}
      coverage: ${{ vars.COVERAGE_ENABLED != 'false' }}
      coverage-threshold: ${{ fromJSON(vars.COVERAGE_THRESHOLD || '0') }}
      test-packages: ${{ vars.TEST_PACKAGES || './...' }}
      test-args: ${{ vars.TEST_ARGS || '' }}

  release:
    needs: [lint, test]
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
